<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Matías - Restaurante Colombiano</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Playfair+Display:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/menu.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo-section">
                <div class="logo-bg"></div>
                <div class="logo">
                    <img src="assets/img/logo.png" alt="Don Matías" class="header-logo">
                </div>
            </div>
        </div>

        <div class="hero-section">
            <div class="hero-image">
                <div class="carousel">
                    <div class="carousel-track" id="carouselTrack"></div>
                    <div class="carousel-dots" id="carouselDots"></div>
                </div>
            </div>
        </div>

        <!-- Colombian Accent -->
        <div class="colombian-accent-section">
            <div class="colombian-accent">🇨🇴 Hecho con amor colombiano</div>
        </div>

        <!-- Menu Categories -->
        <div class="menu-section">
            <h2 class="section-title">Nuestro Menú</h2>
            <div class="categories-grid" id="categories-grid">
                <!-- Las tarjetas se generan dinámicamente desde MENU_CONFIG en el script -->
            </div>
        </div>

        <!-- Footer -->
        <div class="footer-section">
            <div class="restaurant-info">
                <div class="qr-section">
                    <h2 class="qr-title">Conéctate con Don Matías</h2>
                    <p class="qr-subtitle">"Donde cada comida es una fiesta colombiana"</p>

                    <div class="qr-grid">
                        <div class="qr-card" onclick="openQrModal('assets/img/qr/qr_google.webp', '⭐ Google Reviews')">
                            <div class="qr-social-logo">
                                <img src="assets/img/qr/logo_google.png" alt="Google">
                            </div>
                            <div class="qr-image-wrapper">
                                <img src="assets/img/qr/qr_google.webp" alt="QR Google">
                            </div>
                            <div class="qr-tap-hint">Toca para escanear →</div>
                        </div>

                        <div class="qr-card" onclick="openQrModal('assets/img/qr/qr_facebook.webp', 'Facebook')">
                            <div class="qr-social-logo">
                                <img src="assets/img/qr/logo_facebook.webp" alt="Facebook">
                            </div>
                            <div class="qr-image-wrapper">
                                <img src="assets/img/qr/qr_facebook.webp" alt="QR Facebook">
                            </div>
                            <div class="qr-tap-hint">Toca para escanear →</div>
                        </div>

                        <div class="qr-card" onclick="openQrModal('assets/img/qr/qr_instagram.webp', 'Instagram')">
                            <div class="qr-social-logo">
                                <img src="assets/img/qr/logo_instagram.webp" alt="Instagram">
                            </div>
                            <div class="qr-image-wrapper">
                                <img src="assets/img/qr/qr_instagram.webp" alt="QR Instagram">
                            </div>
                            <div class="qr-tap-hint">Toca para escanear →</div>
                        </div>

                        <!--<div class="qr-card" onclick="openQrModal('assets/img/qr-togo.png', 'TO GO MENÚ')">
                            <div class="qr-image-wrapper">
                                <img src="assets/img/qr-togo.png" alt="QR To Go">
                            </div>
                            <div class="qr-label">TO GO MENÚ</div>
                        </div>-->
                    </div>
                    <p class="qr-blessing">✝️ Este Menú fue Realizado con el Amor de Dios.<br>Dios te Bendiga 🙏</p>
                </div>
            </div>
            <!-- MODAL QR -->
            <div id="qrModal" class="qr-modal-overlay" onclick="closeQrModal()">
                <div class="qr-modal-container" onclick="event.stopPropagation()">
                    <button class="qr-modal-close" onclick="closeQrModal()">&times;</button>
                    <p class="qr-modal-label" id="qrModalLabel"></p>
                    <div class="qr-modal-image-wrapper">
                        <img id="qrModalImage" src="" alt="QR Code">
                    </div>
                    <p class="qr-modal-hint">Apunta tu cámara para escanear</p>
                </div>
            </div>
        </div>
    </div>
    <script src="assets/js/menu.js"></script>
</body>
</html>
